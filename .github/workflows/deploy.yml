name: Test, Build, and Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/konglomerat-platform/backend
  DEFAULT_APP_DIR: /home/ubuntu/konglamerat

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.20"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run tests
        run: uv run pytest

      - name: Check migrations
        run: uv run python manage.py makemigrations --check --dry-run --settings=core.settings.test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:main
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.KONGLOMERAT_SSH_PRIVATE_KEY }}
          SERVER_HOST: ${{ vars.KONGLOMERAT_SERVER_HOST }}
          SERVER_PORT: ${{ vars.KONGLOMERAT_SERVER_PORT }}
        run: |
          test -n "$SSH_PRIVATE_KEY"
          test -n "$SERVER_HOST"
          SERVER_PORT="${SERVER_PORT:-22}"
          mkdir -p ~/.ssh
          install -m 600 /dev/null ~/.ssh/konglomerat_deploy_key
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/konglomerat_deploy_key
          ssh-keyscan -p "$SERVER_PORT" "$SERVER_HOST" >> ~/.ssh/known_hosts

      - name: Upload deployment manifests
        env:
          SERVER_HOST: ${{ vars.KONGLOMERAT_SERVER_HOST }}
          SERVER_USER: ${{ vars.KONGLOMERAT_SERVER_USER }}
          SERVER_PORT: ${{ vars.KONGLOMERAT_SERVER_PORT }}
          APP_DIR: ${{ vars.KONGLOMERAT_APP_DIR }}
        run: |
          SERVER_USER="${SERVER_USER:-ubuntu}"
          SERVER_PORT="${SERVER_PORT:-22}"
          APP_DIR="${APP_DIR:-$DEFAULT_APP_DIR}"
          SSH="ssh -i ~/.ssh/konglomerat_deploy_key -p $SERVER_PORT"
          SCP="scp -i ~/.ssh/konglomerat_deploy_key -P $SERVER_PORT"

          $SSH "$SERVER_USER@$SERVER_HOST" "mkdir -p '$APP_DIR/nginx' '$APP_DIR/frontend/dist'"
          $SCP docker-compose.yml "$SERVER_USER@$SERVER_HOST:$APP_DIR/docker-compose.yml"
          $SCP nginx/default.conf "$SERVER_USER@$SERVER_HOST:$APP_DIR/nginx/default.conf"
          $SCP .env.production.example "$SERVER_USER@$SERVER_HOST:$APP_DIR/.env.production.example"

      - name: Deploy backend stack
        env:
          SERVER_HOST: ${{ vars.KONGLOMERAT_SERVER_HOST }}
          SERVER_USER: ${{ vars.KONGLOMERAT_SERVER_USER }}
          SERVER_PORT: ${{ vars.KONGLOMERAT_SERVER_PORT }}
          APP_DIR: ${{ vars.KONGLOMERAT_APP_DIR }}
          GHCR_READ_TOKEN: ${{ secrets.KONGLOMERAT_GHCR_READ_TOKEN }}
          GHCR_USERNAME: ${{ github.actor }}
          BACKEND_IMAGE: ghcr.io/konglomerat-platform/backend:${{ github.sha }}
        run: |
          SERVER_USER="${SERVER_USER:-ubuntu}"
          SERVER_PORT="${SERVER_PORT:-22}"
          APP_DIR="${APP_DIR:-$DEFAULT_APP_DIR}"
          SSH="ssh -i ~/.ssh/konglomerat_deploy_key -p $SERVER_PORT"

          $SSH "$SERVER_USER@$SERVER_HOST" \
            "APP_DIR='$APP_DIR' SERVER_HOST='$SERVER_HOST' BACKEND_IMAGE='$BACKEND_IMAGE' GHCR_READ_TOKEN='$GHCR_READ_TOKEN' GHCR_USERNAME='$GHCR_USERNAME' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$APP_DIR"

          if [ ! -f .env ]; then
            cp .env.production.example .env
            SECRET_KEY="$(openssl rand -hex 48)"
            DB_PASSWORD="$(openssl rand -hex 24)"
            sed -i "s|^SECRET_KEY=.*|SECRET_KEY=$SECRET_KEY|" .env
            sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=$DB_PASSWORD|" .env
            sed -i "s|^ALLOWED_HOSTS=.*|ALLOWED_HOSTS=$SERVER_HOST,localhost,127.0.0.1|" .env
            sed -i "s|^CORS_ALLOWED_ORIGINS=.*|CORS_ALLOWED_ORIGINS=http://$SERVER_HOST|" .env
            sed -i "s|^CSRF_TRUSTED_ORIGINS=.*|CSRF_TRUSTED_ORIGINS=http://$SERVER_HOST|" .env
          fi

          if [ -n "${GHCR_READ_TOKEN:-}" ]; then
            echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          # Pin the resolved image in .env. Without this the file keeps the
          # :main default, and any later `docker compose up` (including the
          # frontend deploy bringing up nginx, which pulls in its backend
          # dependency) recreates the backend from a stale local :main image
          # and silently rolls this deployment back.
          if grep -q '^BACKEND_IMAGE=' .env; then
            sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=$BACKEND_IMAGE|" .env
          else
            echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> .env
          fi

          BACKEND_IMAGE="$BACKEND_IMAGE" docker compose pull backend
          BACKEND_IMAGE="$BACKEND_IMAGE" docker compose up -d --remove-orphans postgres backend nginx
          docker compose ps

          # Confirm the container really is the image we just built, so a
          # deployment that failed to recreate cannot report success.
          # `compose images -q` prints a bare hex id, `image inspect` prints it
          # sha256-prefixed, so normalise before comparing.
          RUNNING_IMAGE="$(docker compose images -q backend | head -n1 | sed 's|^sha256:||')"
          EXPECTED_IMAGE="$(docker image inspect --format '{{.Id}}' "$BACKEND_IMAGE" | sed 's|^sha256:||')"
          if [ "$RUNNING_IMAGE" != "$EXPECTED_IMAGE" ]; then
            echo "Backend container runs '$RUNNING_IMAGE', expected '$EXPECTED_IMAGE' ($BACKEND_IMAGE)" >&2
            docker compose logs --tail=100 backend
            exit 1
          fi

          deployed=0
          for attempt in $(seq 1 30); do
            if docker compose exec -T nginx wget -q -T 5 -O /dev/null http://127.0.0.1/api/schema/; then
              deployed=1
              break
            fi
            sleep 2
          done

          if [ "$deployed" -ne 1 ]; then
            docker compose logs --tail=100 backend nginx
            exit 1
          fi

          # Assert the admin route exists in the code that is actually running.
          # Checked through Django rather than HTTP so the result cannot be
          # muddied by proxy redirects; reverse() raises if admin is unrouted.
          # A stale image serves the API fine but has no api/admin/ route, and
          # the /api/schema/ probe above cannot tell the difference.
          if ! docker compose exec -T backend \
            python manage.py shell -c "from django.urls import reverse; print(reverse('admin:index'))"; then
            echo "Admin route missing from the deployed image ($BACKEND_IMAGE)" >&2
            docker compose logs --tail=100 backend
            exit 1
          fi

          echo "Deployed $BACKEND_IMAGE with a reachable admin route"
          REMOTE
