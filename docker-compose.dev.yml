name: ${COMPOSE_PROJECT_NAME:-konglomerat-dev}

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-konglomerat}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT_FORWARD:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_FORWARD:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.14.5-slim-bookworm}
        PYPI_INDEX_URL: ${PYPI_INDEX_URL:-https://pypi.org/simple}
        UV_VERSION: ${UV_VERSION:-0.11.20}
    image: ${BACKEND_IMAGE:-konglomerat-backend:dev}
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-./.env}
    environment:
      DJANGO_ENV: ${DJANGO_ENV:-dev}
      DEBUG: ${DEBUG:-True}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-konglomerat}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - .:/app
      - django_static:/app/staticfiles
      - django_media:/app/media

volumes:
  postgres_data:
  redis_data:
  django_static:
  django_media:
